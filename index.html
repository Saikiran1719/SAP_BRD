<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP B1 Requirement Console</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1F1A10; --ink-2:#4A4234; --paper:#D6D2C6; --surface:#FCF4D9;
  --line:#8F8668; --cobalt:#10357F; --cobalt-soft:#FBEBB5;
  --gold:#F0AB00; --sel-blue:#10357F;
  --amber:#7A5C00; --amber-bg:#F6E39E; --green:#1B6B35; --green-bg:#D6EBD0;
  --blue:#10357F; --blue-bg:#D3DEF2; --grey:#6A6250; --grey-bg:#E9E2C8;
  --form-grad:linear-gradient(180deg,#FDF8E4 0%,#F7E7AE 55%,#EFD277 100%);
  --win-shadow:1px 1px 0 #B5AE96,2px 2px 4px rgba(0,0,0,.18);
  --mono:'Poppins',Tahoma,'Segoe UI',sans-serif;
  --sans:'Poppins',Tahoma,'Segoe UI',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:13px;line-height:1.45}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:12.5px;color:var(--ink);border:1px solid #7F9DB9;border-radius:0;padding:5px 8px;background:#fff;width:100%;box-shadow:inset 1px 1px 2px rgba(0,0,0,.08)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--gold);outline-offset:0;border-color:#7F9DB9}
textarea{resize:vertical;min-height:64px}

/* ---------- Top bar (classic title bar) ---------- */
.topbar{background:linear-gradient(90deg,#0A246A 0%,#2A5298 60%,#3A6EA5 100%);color:#fff;padding:0 20px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:40;border-bottom:2px solid #6E6A5E;box-shadow:inset 0 1px 0 #5B83C2}
.brand{display:flex;align-items:baseline;gap:10px;white-space:nowrap}
.brand h1{font-size:14.5px;font-weight:600;letter-spacing:.2px}
.brand .tag{font-family:var(--mono);font-size:10px;color:#F5C64B;letter-spacing:1px;text-transform:uppercase}
.conn{margin-left:auto;display:flex;align-items:center;gap:8px}
.conn input{width:340px;max-width:38vw;background:#fff;border-color:#0A246A;color:var(--ink);font-family:var(--mono);font-size:11px}
.conn input::placeholder{color:#8A8672}
.btn{border:1px solid #6E6A5E;border-radius:2px;padding:6px 14px;font-weight:500;font-size:12.5px;background:linear-gradient(180deg,#FDFCF7,#E8E4D4);color:var(--ink);box-shadow:inset 1px 1px 0 #FFFFFF,inset -1px -1px 0 #B8B29E,1px 1px 2px rgba(0,0,0,.15)}
.btn:hover{background:linear-gradient(180deg,#FFFEFA,#F1EDDE)}
.btn:active{background:#E4DFCC;box-shadow:inset 1px 1px 3px #A9A28A}
.btn-primary{background:linear-gradient(180deg,#FFD766,#F0AB00);color:#3A2A00;border-color:#8A6D1F;box-shadow:inset 1px 1px 0 #FFEBB0,inset -1px -1px 0 #C68F0A,1px 1px 2px rgba(0,0,0,.15)}
.btn-primary:hover{background:linear-gradient(180deg,#FFDF85,#F7B60E)}
.btn-primary:active{background:#E8A500;box-shadow:inset 1px 1px 3px #9A7008}
.btn-ghost{background:linear-gradient(180deg,#FDFCF7,#E8E4D4);color:var(--ink)}
.dot{width:10px;height:10px;border-radius:50%;background:#C43C1E;flex:none;border:1px solid #fff}
.dot.on{background:#3FA96C}
.conn-label{font-size:12px;color:#C9D6EE;white-space:nowrap}

/* ---------- Layout ---------- */
.wrap{display:grid;grid-template-columns:264px 1fr;gap:0;min-height:calc(100vh - 56px)}

/* ---------- Module rail (B1 Main Menu tree) ---------- */
.rail{background:var(--form-grad);border-right:1px solid var(--line);padding:16px 0 30px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;box-shadow:inset -1px 0 0 rgba(255,255,255,.6)}
.rail h2{font-family:var(--mono);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;color:#6E5A1E;padding:0 18px 10px}
.mod{display:block;width:100%;text-align:left;background:none;border:none;border-left:4px solid transparent;padding:8px 18px 8px 14px}
.mod:hover{background:rgba(255,255,255,.5)}
.mod.active{background:var(--sel-blue);border-left-color:var(--gold)}
.mod .name{font-size:12.5px;font-weight:500;color:var(--ink);display:flex;justify-content:space-between;gap:8px}
.mod.active .name{color:#fff}
.mod .count{font-family:var(--mono);font-size:11px;color:var(--grey)}
.mod.active .count{color:#C9D6EE}
.mod .bar{height:8px;background:#fff;border:1px solid #7F9DB9;margin-top:6px;overflow:hidden}
.mod .bar i{display:block;height:100%;background:repeating-linear-gradient(90deg,#316AC5 0 6px,transparent 6px 8px);width:0%}

/* ---------- Main ---------- */
.main{padding:20px 24px 60px;min-width:0}
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.toolbar input[type=search]{max-width:300px}
.toolbar select{width:auto}
.summary{font-family:var(--mono);font-size:11px;color:var(--ink-2);margin-left:auto;white-space:nowrap}

.card{background:var(--form-grad);border:1px solid var(--line);border-radius:3px;margin-bottom:12px;overflow:hidden;box-shadow:var(--win-shadow),inset 1px 1px 0 rgba(255,255,255,.7)}
.card-head{display:grid;grid-template-columns:92px 1fr auto;gap:12px;align-items:start;padding:12px 16px;cursor:pointer}
.card-head:hover{background:rgba(255,255,255,.4)}
.rid{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--blue);padding-top:2px}
.q .cat{font-family:var(--mono);font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:#7A6A2F}
.q .text{font-size:13px;font-weight:500;margin-top:2px}
.q .resp{font-size:12.5px;color:var(--ink-2);margin-top:5px;white-space:pre-wrap}
.q .resp.empty{color:#9A8C5E;font-style:italic}
.chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;padding-top:2px}
.chip{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:2px;white-space:nowrap;border:1px solid}
.chip.st-Open{background:var(--amber-bg);color:var(--amber)}
.chip.st-InDiscussion{background:var(--blue-bg);color:var(--blue)}
.chip.st-Confirmed{background:var(--green-bg);color:var(--green)}
.chip.st-Deferred,.chip.st-Closed{background:var(--grey-bg);color:var(--grey)}
.chip.gap{background:#F3C7BE;color:#8E2210}
.chip.pri{background:var(--grey-bg);color:var(--ink-2)}

.editor{border-top:1px solid #C3AF6B;box-shadow:inset 0 1px 0 #FFFDF2;background:linear-gradient(180deg,#F6E7AC,#EFD277);padding:16px;display:none}
.card.open .editor{display:block}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid .span2{grid-column:span 2}.grid .span4{grid-column:span 4}
.field label{display:block;font-family:var(--sans);font-size:11px;letter-spacing:0;text-transform:none;font-weight:500;color:#5C4A14;margin-bottom:3px}
.ed-actions{display:flex;gap:10px;margin-top:14px;align-items:center}
.saved-at{font-family:var(--mono);font-size:11px;color:#6E5A1E;margin-left:auto}

.empty-state{background:var(--form-grad);border:1px solid var(--line);border-radius:3px;padding:48px 20px;text-align:center;color:#6E6046;box-shadow:var(--win-shadow),inset 1px 1px 0 rgba(255,255,255,.7)}
.empty-state b{color:var(--ink);display:block;font-size:14.5px;margin-bottom:6px}

/* ---------- Toast & overlay (classic tooltip / dialog) ---------- */
.toast{position:fixed;bottom:22px;left:50%;transform:translate(-50%,90px);background:#FFFFE1;color:var(--ink);padding:9px 16px;border:1px solid #6E6A5E;border-radius:2px;font-size:12.5px;transition:transform .25s;z-index:60;box-shadow:2px 2px 5px rgba(0,0,0,.3)}
.toast.show{transform:translate(-50%,0)}
.toast.err{background:#F3C7BE;color:#7A1E10;border-color:#7A1E10}
.loading{position:fixed;inset:0;background:rgba(60,56,44,.4);display:none;align-items:center;justify-content:center;z-index:50}
.loading.show{display:flex}
.loading span{background:#ECE9D8;padding:14px 22px;border:1px solid #6E6A5E;border-radius:2px;font-weight:600;box-shadow:inset 1px 1px 0 #fff,3px 3px 8px rgba(0,0,0,.3)}
@media (max-width:900px){
  .wrap{grid-template-columns:1fr}
  .rail{position:static;height:auto;display:flex;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line);padding:10px}
  .rail h2{display:none}.mod{min-width:170px;border-left:none;border-bottom:4px solid transparent}
  .mod.active{border-bottom-color:var(--gold)}
  .conn input{max-width:30vw}
  .grid{grid-template-columns:1fr 1fr}.grid .span2,.grid .span4{grid-column:span 2}
}
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1>SAP B1 Requirement Console</h1>
    <span class="tag">Workshop Capture</span>
  </div>
  <div class="conn">
    <span class="dot" id="connDot"></span>
    <span class="conn-label" id="connLabel">Not connected</span>
    <input type="url" id="apiUrl" placeholder="Paste Google Apps Script Web App URL (ends with /exec)">
    <button class="btn btn-primary" id="btnConnect">Connect</button>
  </div>
</header>

<div class="wrap">
  <nav class="rail" id="rail">
    <h2>Modules</h2>
  </nav>

  <main class="main">
    <div class="toolbar">
      <input type="search" id="search" placeholder="Search requirements…">
      <select id="statusFilter">
        <option value="">All statuses</option>
        <option>Open</option><option>In Discussion</option><option>Confirmed</option>
        <option>Deferred</option><option>Closed</option>
      </select>
      <select id="gapFilter">
        <option value="">Gaps & non-gaps</option>
        <option value="Y">Gaps only</option>
      </select>
      <button class="btn btn-ghost" id="btnAdd">+ Add requirement</button>
      <button class="btn btn-ghost" id="btnRefresh">Refresh</button>
      <span class="summary" id="summary"></span>
    </div>
    <div id="list">
      <div class="empty-state">
        <b>Connect your Google Sheet to begin</b>
        Paste your Apps Script Web App URL in the top bar and click Connect.
        All questions and answers load from — and save back to — your sheet.
      </div>
    </div>
  </main>
</div>

<div class="loading" id="loading"><span>Syncing with Google Sheet…</span></div>
<div class="toast" id="toast"></div>

<script>
'use strict';
let API = '';
let ROWS = [];
let activeModule = '';

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- Connection ---------- */
function initApiFromHash(){
  const m = location.hash.match(/api=([^&]+)/);
  if (m) { $('apiUrl').value = decodeURIComponent(m[1]); connect(); }
}
async function connect(){
  const url = $('apiUrl').value.trim();
  if (!/^https:\/\/script\.google(usercontent)?\.com\/.+/.test(url)) {
    toast('Enter a valid Apps Script URL ending in /exec', true); return;
  }
  API = url;
  location.hash = 'api=' + encodeURIComponent(url);
  await loadData();
}
async function loadData(){
  showLoading(true);
  try {
    const res = await fetch(API);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Unexpected response');
    ROWS = data.rows;
    $('connDot').classList.add('on');
    $('connLabel').textContent = 'Connected · ' + ROWS.length + ' requirements';
    if (!activeModule && ROWS.length) activeModule = moduleList()[0];
    render();
    toast('Loaded ' + ROWS.length + ' requirements from Google Sheet');
  } catch (err) {
    $('connDot').classList.remove('on');
    $('connLabel').textContent = 'Not connected';
    toast('Could not load: ' + err.message + '. Check the URL and that the deployment allows "Anyone".', true);
  } finally { showLoading(false); }
}

/* ---------- Rendering ---------- */
function moduleList(){
  return [...new Set(ROWS.map(r => r.module))].sort((a,b)=>parseFloat(a)-parseFloat(b));
}
function render(){ renderRail(); renderList(); }

function renderRail(){
  const rail = $('rail');
  rail.querySelectorAll('.mod').forEach(e => e.remove());
  moduleList().forEach(mod => {
    const rows = ROWS.filter(r => r.module === mod);
    const done = rows.filter(r => r.status && r.status !== 'Open').length;
    const btn = document.createElement('button');
    btn.className = 'mod' + (mod === activeModule ? ' active' : '');
    btn.innerHTML = '<div class="name"><span>' + esc(mod) + '</span>' +
      '<span class="count">' + String(done).padStart(2,'0') + '/' + String(rows.length).padStart(2,'0') + '</span></div>' +
      '<div class="bar"><i style="width:' + (rows.length ? Math.round(done/rows.length*100) : 0) + '%"></i></div>';
    btn.onclick = () => { activeModule = mod; render(); };
    rail.appendChild(btn);
  });
}

function renderList(){
  const q = $('search').value.trim().toLowerCase();
  const st = $('statusFilter').value;
  const gp = $('gapFilter').value;
  let rows = ROWS.filter(r => r.module === activeModule);
  if (q) rows = ROWS.filter(r =>
    [r.reqId, r.module, r.category, r.question, r.response, r.solution, r.owner, r.notes]
      .join(' ').toLowerCase().includes(q));
  if (st) rows = rows.filter(r => r.status === st);
  if (gp) rows = rows.filter(r => r.gap === gp);

  $('summary').textContent = rows.length + ' shown · ' +
    ROWS.filter(r => r.status === 'Confirmed' || r.status === 'Closed').length + '/' + ROWS.length + ' resolved overall';

  const list = $('list');
  if (!ROWS.length) return;
  if (!rows.length) {
    list.innerHTML = '<div class="empty-state"><b>No requirements match</b>Adjust the search or filters.</div>';
    return;
  }
  list.innerHTML = rows.map(r => cardHtml(r, !!q)).join('');
  rows.forEach(r => bindCard(r.reqId));
}

function cardHtml(r, searching){
  const stClass = 'st-' + String(r.status || 'Open').replace(/\s/g,'');
  return '<div class="card" id="card-' + esc(r.reqId) + '">' +
    '<div class="card-head" data-toggle>' +
      '<div class="rid">' + esc(r.reqId) + '</div>' +
      '<div class="q"><div class="cat">' + esc(r.category) + (searching ? ' · ' + esc(r.module) : '') + '</div>' +
        '<div class="text">' + esc(r.question) + '</div>' +
        '<div class="resp ' + (r.response ? '' : 'empty') + '">' + (r.response ? esc(r.response) : 'No response recorded yet') + '</div></div>' +
      '<div class="chips">' +
        (r.gap === 'Y' ? '<span class="chip gap">GAP</span>' : '') +
        (r.priority ? '<span class="chip pri">' + esc(r.priority) + '</span>' : '') +
        '<span class="chip ' + stClass + '">' + esc(r.status || 'Open') + '</span></div>' +
    '</div>' +
    '<div class="editor"><div class="grid">' +
      fld('Client response / current process', 'response', r, 'textarea', 'span4') +
      sel('Priority', 'priority', r, ['','Must Have','Should Have','Nice to Have']) +
      sel('SAP B1 fit', 'fit', r, ['','Standard','Configuration','Customization','Add-on','Out of Scope']) +
      sel('Gap', 'gap', r, ['','N','Y']) +
      sel('Status', 'status', r, ['Open','In Discussion','Confirmed','Deferred','Closed']) +
      fld('Proposed solution / workaround', 'solution', r, 'textarea', 'span2') +
      fld('Notes', 'notes', r, 'textarea', 'span2') +
      fld('Owner', 'owner', r, 'input', 'span2') +
    '</div><div class="ed-actions">' +
      '<button class="btn btn-primary" data-save>Save to Google Sheet</button>' +
      '<button class="btn btn-ghost" data-close>Collapse</button>' +
      '<span class="saved-at">' + (r.updatedAt ? 'Last saved ' + esc(r.updatedAt) : 'Never saved') + '</span>' +
    '</div></div></div>';
}
function fld(label, key, r, kind, span){
  const v = esc(r[key]);
  const el = kind === 'textarea'
    ? '<textarea data-k="' + key + '">' + v + '</textarea>'
    : '<input data-k="' + key + '" value="' + v + '">';
  return '<div class="field ' + (span||'') + '"><label>' + label + '</label>' + el + '</div>';
}
function sel(label, key, r, opts){
  return '<div class="field"><label>' + label + '</label><select data-k="' + key + '">' +
    opts.map(o => '<option' + (o === (r[key]||opts[0]) ? ' selected' : '') + '>' + o + '</option>').join('') +
    '</select></div>';
}

function bindCard(reqId){
  const card = $('card-' + reqId);
  const r = ROWS.find(x => x.reqId === reqId);
  card.querySelector('[data-toggle]').onclick = () => card.classList.toggle('open');
  card.querySelector('[data-close]').onclick = () => card.classList.remove('open');
  card.querySelector('[data-save]').onclick = async () => {
    card.querySelectorAll('[data-k]').forEach(el => r[el.dataset.k] = el.value.trim());
    await save(r);
  };
}

/* ---------- Saving ---------- */
async function save(record){
  if (!API) { toast('Connect to your Google Sheet first', true); return; }
  showLoading(true);
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'upsert', record })
    });
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Save rejected');
    record.updatedAt = data.updatedAt;
    render();
    toast(record.reqId + ' saved to Google Sheet ✓');
  } catch (err) {
    toast('Save failed: ' + err.message, true);
  } finally { showLoading(false); }
}

/* ---------- Add new ---------- */
$('btnAdd').onclick = async () => {
  if (!ROWS.length) { toast('Connect and load your sheet first', true); return; }
  const mod = activeModule || moduleList()[0];
  const prefix = (ROWS.find(r => r.module === mod)?.reqId || 'NEW-000').split('-')[0];
  const nums = ROWS.filter(r => r.reqId.startsWith(prefix + '-')).map(r => parseInt(r.reqId.split('-')[1]) || 0);
  const reqId = prefix + '-' + String(Math.max(0, ...nums) + 1).padStart(3, '0');
  const cat = prompt('Category for the new requirement (e.g., Pricing):', 'General');
  if (cat === null) return;
  const question = prompt('Requirement / question text:');
  if (!question) return;
  const rec = { reqId, module: mod, category: cat, question, response:'', priority:'',
    fit:'', gap:'', solution:'', owner:'', status:'Open', notes:'' };
  ROWS.push(rec);
  await save(rec);
  render();
  const card = $('card-' + reqId);
  if (card) { card.classList.add('open'); card.scrollIntoView({behavior:'smooth', block:'center'}); }
};

/* ---------- UI helpers ---------- */
let toastTimer;
function toast(msg, isErr){
  const t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isErr ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), isErr ? 6000 : 3000);
}
function showLoading(on){ $('loading').classList.toggle('show', on); }

$('btnConnect').onclick = connect;
$('btnRefresh').onclick = () => API ? loadData() : toast('Connect first', true);
$('apiUrl').addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });
['search','statusFilter','gapFilter'].forEach(id => $(id).addEventListener('input', renderList));
initApiFromHash();
</script>
</body>
</html>
